{{ with hugo.Data.ctas.ctas }}
<section class="ctas" aria-labelledby="ctas-heading">
  <h2 id="ctas-heading" class="ctas-heading">Explore</h2>
  <svg class="cta-icons" aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <symbol id="cta-icon-sliders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="21" x2="4" y2="14"></line>
        <line x1="4" y1="10" x2="4" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12" y2="3"></line>
        <line x1="20" y1="21" x2="20" y2="16"></line>
        <line x1="20" y1="12" x2="20" y2="3"></line>
        <line x1="1" y1="14" x2="7" y2="14"></line>
        <line x1="9" y1="8" x2="15" y2="8"></line>
        <line x1="17" y1="16" x2="23" y2="16"></line>
      </symbol>
      <symbol id="cta-icon-youtube" viewBox="0 0 24 24" fill="currentColor">
        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
      </symbol>
    </defs>
  </svg>
  <ul class="cta-grid">
    {{ range . }}
    <li>
      <a class="cta-card" href="{{ .href }}"{{ if .external }} target="_blank" rel="noopener noreferrer"{{ end }}{{ if .external }} aria-label="{{ .title }} (opens in new tab)"{{ end }}>
        <svg class="cta-card-icon" aria-hidden="true" focusable="false"><use href="#cta-icon-{{ .icon }}"></use></svg>
        <h3 class="cta-card-title">{{ .title }}</h3>
        <p class="cta-card-subtitle">{{ .subtitle }}</p>
      </a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
